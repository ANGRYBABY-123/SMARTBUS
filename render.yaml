# Render Blueprint – https://render.com/docs/blueprint-spec
#
# HOW TO USE
# ──────────────────────────────────────────────────────────────────────────────
# 1. Push this repo to GitHub / GitLab.
# 2. On render.com → New → Blueprint → connect your repo.
# 3. Fill in the four secret env vars (DB_HOST, DB_USER, DB_PASS, DB_NAME).
#    Recommended MySQL providers (free tier available):
#      • PlanetScale  https://planetscale.com
#      • Railway      https://railway.app
#      • Aiven        https://aiven.io
#      • TiDB Cloud   https://tidbcloud.com
# 4. Deploy – Render will build the Docker image and start the app at
#    https://<service-name>.onrender.com/login
# ──────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: smartbus
    runtime: docker
    plan: free          # upgrade to `starter` for no spin-down
    healthCheckPath: /users/login

    envVars:
      # ── Database connection ───────────────────────────────────────────────
      # Set ALL five vars in the Render dashboard.  No defaults here because
      # the values differ per provider (Railway uses port 31694, DB name "railway").
      - key: DB_HOST
        sync: false     # e.g. trolley.proxy.rlwy.net
      - key: DB_PORT
        sync: false     # e.g. 31694 (Railway) or 3306 (most others)
      - key: DB_NAME
        sync: false     # e.g. railway (Railway) or smartbus (local)
      - key: DB_USER
        sync: false     # e.g. root
      - key: DB_PASS
        sync: false     # your DB password (never commit secrets)

      # ── Email (JavaMail / SMTP) ───────────────────────────────────────────
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false     # set manually in Render dashboard (sender Gmail address)
      - key: SMTP_PASS
        sync: false     # set manually in Render dashboard (Gmail App Password)

      # ── Google Maps JavaScript API ────────────────────────────────────────
      - key: GOOGLE_MAPS_API_KEY
        sync: false     # get key at https://console.cloud.google.com → Maps JS API (~28,000 map loads/month free)
      # ── AI (Groq / Llama 3 — free tier: 14,400 req/day) ─────────────────
      - key: GROQ_API_KEY
        sync: false     # get free key at https://console.groq.com
      # ── Africa's Talking (SMS OTP at registration) ────────────────────────────
      - key: AT_API_KEY
        sync: false     # set manually in Render dashboard
      - key: AT_USERNAME
        sync: false     # your AT username (use "sandbox" for testing)
      - key: AT_SENDER_ID
        sync: false     # optional sender name/shortcode (e.g. CommuteSafe)
      # ── Optional JVM tuning ───────────────────────────────────────────────
      - key: JAVA_OPTS
        value: "-Xms128m -Xmx400m -XX:+UseContainerSupport"
